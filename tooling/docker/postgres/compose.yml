services:
  postgres:
    image: postgres:16-alpine
    container_name: pisky-postgres
    ports:
      - "8512:5432"
    environment:
      POSTGRES_DB: pisky
      POSTGRES_USER: pisky
      POSTGRES_PASSWORD: pisky
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pisky -d pisky"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
